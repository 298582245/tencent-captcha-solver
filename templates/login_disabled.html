<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebUI 未启用</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f1419;
      color: #e7ecf3;
    }
    .box {
      max-width: 480px;
      padding: 28px 24px;
      background: #1a2332;
      border: 1px solid #2d3a4f;
      border-radius: 12px;
    }
    h1 { margin: 0 0 12px; font-size: 1.2rem; }
    p { margin: 0; color: #8b9cb3; line-height: 1.6; font-size: 14px; }
    code { color: #59a7ff; }
  </style>
</head>
<body>
  <div class="box">
    <h1>WebUI 未启用</h1>
    <p>请设置环境变量 <code>WEBUI_PASSWORD</code> 后重启服务，再访问日志页面。</p>
  </div>
</body>
</html>
